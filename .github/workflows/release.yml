name: "Legacy Release Asset Uploader (disabled)"

on:
  workflow_dispatch:

jobs:
  disabled:
    runs-on: ubuntu-latest
    steps:
      - name: Stop legacy custom asset publishing
        run: |
          echo "This legacy release asset uploader is intentionally disabled."
          echo "Main-line HACS releases use the historical repository source archive mode."
          echo "Do not publish custom release assets from a release-published workflow."
          echo "If a future custom asset release is explicitly approved, implement it as a separate manual pre-publication gate with zip-root validation."
          exit 1
